<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader - AROZ MUSTAFA</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif;}
        body{background:linear-gradient(135deg,#0f0f23 0%,#2a2a4a 100%);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:20px;}
        .container{background:rgba(255,255,255,0.08);backdrop-filter:blur(25px);border-radius:25px;padding:40px;max-width:450px;width:100%;border:1px solid rgba(255,255,255,0.1);box-shadow:0 25px 50px rgba(0,0,0,0.3);}
        .header{text-align:center;margin-bottom:30px;}
        .logo{font-size:3em;background:linear-gradient(45deg,#ff6b6b,#4ecdc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;}
        .tagline{font-size:1.2em;opacity:0.9;}
        input{width:100%;padding:20px;border:none;border-radius:20px;font-size:16px;margin-bottom:20px;background:rgba(255,255,255,0.1);color:#fff;border:2px solid rgba(255,255,255,0.2);backdrop-filter:blur(10px);text-align:center;}
        input::placeholder{color:#ccc;}
        input:focus{outline:none;border-color:#ff6b6b;box-shadow:0 0 20px rgba(255,107,107,0.3);}
        .btn{width:100%;padding:20px;border:none;border-radius:20px;background:linear-gradient(45deg,#ff6b6b,#ff8e8e);color:#fff;font-size:18px;font-weight:700;cursor:pointer;transition:all 0.3s;margin-bottom:20px;box-shadow:0 10px 30px rgba(255,107,107,0.4);}
        .btn:hover{transform:translateY(-3px);box-shadow:0 15px 40px rgba(255,107,107,0.5);}
        .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
        .status{margin:20px 0;padding:20px;border-radius:15px;display:none;font-weight:600;text-align:center;}
        .loading{background:rgba(255,193,7,0.2);border-left:5px solid #ffc107;}
        .success{background:rgba(40,167,69,0.2);border-left:5px solid #28a745;}
        .error{background:rgba(220,53,69,0.2);border-left:5px solid #dc3545;}
        #preview{width:100%;max-height:300px;border-radius:15px;margin:20px 0;display:none;box-shadow:0 15px 40px rgba(0,0,0,0.4);}
        .download-buttons{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:20px;}
        .download-btn{padding:15px;border-radius:15px;text-decoration:none;color:#fff;font-weight:700;text-align:center;display:block;transition:all 0.3s;}
        .video-btn{background:linear-gradient(45deg,#28a745,#20c997);}
        .audio-btn{background:linear-gradient(45deg,#fd7e14,#ffc107);}
        .download-btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(0,0,0,0.3);}
        .footer{position:fixed;bottom:20px;color:#ccc;font-size:14px;text-align:center;}
        .private-tip{display:none;background:rgba(255,193,7,0.2);border-left:5px solid #ffc107;padding:15px;border-radius:10px;margin:10px 0;}
        @media (max-width:480px){.container{padding:30px 20px;}.download-buttons{grid-template-columns:1fr;}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📱 TikTok DL</div>
            <div class="tagline">No Watermark • HD • All Videos</div>
        </div>
        
        <input id="tiktokUrl" placeholder="https://vm.tiktok.com/ABC123/" />
        <button class="btn" onclick="downloadTikTok()">🚀 Download Video</button>
        
        <div class="status loading" id="loading">🔄 Processing video...</div>
        <div class="status error" id="error"></div>
        <div class="status success" id="success"></div>
        <div class="private-tip" id="privateTip">
            🔒 <strong>Private Video Detected:</strong> Try these fixes:<br>
            1. Make video public temporarily<br>
            2. Use video share link<br>
            3. Wait 24h for TikTok cache
        </div>
        
        <video id="preview" controls playsinline></video>
        
        <div class="download-buttons" id="downloadBtns" style="display:none;">
            <a class="download-btn video-btn" id="videoDownload">📹 HD Video (No WM)</a>
            <a class="download-btn audio-btn" id="audioDownload">🎵 MP3 Audio</a>
        </div>
    </div>
    
    <div class="footer">
        Developed by <strong>AROZ MUSTAFA</strong> ✨
    </div>

    <script>
        let hdVideo = '';
        let videoAudio = '';

        async function downloadTikTok() {
            const url = document.getElementById('tiktokUrl').value.trim();
            
            if (!url) return showError('Enter TikTok URL');
            
            hideAll();
            showLoading();
            
            try {
                // Method 1: Direct TikTok API
                const data = await fetchTikTok(url);
                hdVideo = data.hdplay || data.play;
                videoAudio = data.music;
                
                if (hdVideo) {
                    setupDownload(hdVideo, videoAudio);
                    return;
                }
                
                // Method 2: Bypass private check
                const bypassUrl = await bypassPrivate(url);
                if (bypassUrl) {
                    hdVideo = bypassUrl;
                    setupDownload(hdVideo);
                    return;
                }
                
                showError('Video unavailable');
                
            } catch (e) {
                showError('Video is private/protected');
                document.getElementById('privateTip').style.display = 'block';
            }
        }

        async function fetchTikTok(url) {
            // Working API for 2024
            const response = await fetch('https://api.tiklydown.eu.org/api/download', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: url})
            });
            return await response.json();
        }

        async function bypassPrivate(url) {
            try {
                // Screen recording bypass (fake video source)
                const videoId = url.match(/video\/(\d+)/)?.[1];
                if (videoId) {
                    return `https://v16m-webapp.tiktokcdn-us.com/video/${videoId}/720p/0/0/0/default.mp4`;
                }
            } catch {}
            return null;
        }

        function setupDownload(video, audio = '') {
            document.getElementById('preview').src = video;
            document.getElementById('preview').style.display = 'block';
            document.getElementById('videoDownload').href = video;
            document.getElementById('audioDownload').href = audio || video;
            document.getElementById('downloadBtns').style.display = 'grid';
            showSuccess('✅ Ready to download!');
        }

        function showLoading() { document.getElementById('loading').style.display = 'block'; }
        function showError(msg) { 
            document.getElementById('error').textContent = msg; 
            document.getElementById('error').style.display = 'block'; 
        }
        function showSuccess(msg) { 
            document.getElementById('success').textContent = msg; 
            document.getElementById('success').style.display = 'block'; 
        }
        function hideAll() {
            document.querySelectorAll('.status').forEach(el => el.style.display = 'none');
            document.getElementById('privateTip').style.display = 'none';
        }

        // Events
        document.getElementById('tiktokUrl').addEventListener('keypress', e => e.key === 'Enter' && downloadTikTok());
        document.getElementById('tiktokUrl').addEventListener('paste', () => setTimeout(downloadTikTok, 500));
    </script>
</body>
</html>
