<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🛠️ TikTok Downloader</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a1a;color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        .box{background:rgba(255,255,255,0.1);backdrop-filter:blur(20px);padding:40px;border-radius:20px;max-width:400px;width:100%;text-align:center;border:1px solid rgba(255,255,255,0.2);}
        h1{font-size:2.5em;margin-bottom:10px;background:linear-gradient(45deg,#ff6b35,#f7931e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        input{width:100%;padding:20px;border:none;border-radius:50px;font-size:16px;margin:20px 0;background:rgba(255,255,255,0.9);color:#333;text-align:center;}
        input::placeholder{color:#999;}
        button{width:100%;padding:20px;border:none;border-radius:50px;background:linear-gradient(45deg,#ff6b35,#f7931e);color:white;font-size:18px;font-weight:bold;cursor:pointer;margin:10px 0;transition:transform 0.2s;}
        button:active{transform:scale(0.98);}
        button:disabled{opacity:0.5;cursor:not-allowed;}
        .status{padding:20px;border-radius:15px;margin:20px 0;display:none;font-weight:500;}
        .loading{background:rgba(255,193,7,0.3);}
        .success{background:rgba(76,175,80,0.3);}
        .error{background:rgba(244,67,54,0.3);}
        .video-container{margin:20px 0;display:none;}
        video{width:100%;max-height:300px;border-radius:15px;}
        .dl-btns{display:grid;gap:15px;margin-top:20px;}
        .dl-btn{background:linear-gradient(45deg,#4caf50,#45a049);padding:15px;border-radius:25px;text-decoration:none;color:white;font-weight:600;display:block;}
        .dl-btn:hover{opacity:0.9;}
        .dl-btn.audio{background:linear-gradient(45deg,#ff9800,#f57c00);}
        @media (max-width:500px){.box{padding:30px 20px;}}
    </style>
</head>
<body>
    <div class="box">
        <h1>📱 TikTok DL</h1>
        <p style="opacity:0.8;margin-bottom:20px;">No Watermark • HD • Works on iPhone</p>
        
        <input id="url" placeholder="Paste TikTok link (vm.tiktok.com or tiktok.com)" />
        <button onclick="getVideo()">🔥 Download</button>
        
        <div class="status loading" id="loading">⏳ Loading...</div>
        <div class="status error" id="error"></div>
        <div class="status success" id="success"></div>
        
        <div class="video-container" id="video">
            <video id="preview" controls muted playsinline></video>
            <div class="dl-btns">
                <a id="dl-video" class="dl-btn" onclick="download('video')">📹 Download HD Video</a>
                <a id="dl-audio" class="dl-btn audio" onclick="download('audio')">🎵 Download Audio</a>
            </div>
        </div>
    </div>

    <script>
        let videoUrl = '';
        let audioUrl = '';

        async function getVideo() {
            const input = document.getElementById('url');
            const url = input.value.trim();
            
            if (!url.includes('tiktok')) {
                showError('Please paste a valid TikTok URL');
                return;
            }
            
            hideAll();
            showLoading('🔍 Getting video...');
            
            try {
                // Extract video ID
                const videoId = url.match(/video\/(\d+)/)?.[1] || 
                               url.match(/\/([a-zA-Z0-9]{9,11})(\/|$)/)?.[1];
                
                if (!videoId) throw new Error('No video ID');
                
                // Direct TikTok API (WORKS ON IPHONE)
                const apiUrl = `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}&hd=1`;
                const res = await fetch(apiUrl);
                const data = await res.json();
                
                if (data.code === 0) {
                    videoUrl = data.data.play;
                    audioUrl = data.data.music;
                    
                    // Set preview
                    document.getElementById('preview').src = videoUrl;
                    document.getElementById('video').style.display = 'block';
                    document.getElementById('dl-video').href = videoUrl;
                    document.getElementById('dl-audio').href = audioUrl;
                    
                    showSuccess('✅ Ready! Long press video or tap buttons to download');
                    return;
                }
                
                throw new Error('API failed');
                
            } catch (e) {
                showError('Video not public or link invalid. Try another.');
            }
        }

        function download(type) {
            const url = type === 'video' ? videoUrl : audioUrl;
            if (!url) return;
            
            // iPhone Safari download fix
            const link = document.createElement('a');
            link.href = url;
            link.download = `tiktok_${type}_${Date.now()}.mp4`;
            link.rel = 'noopener';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Also open in new tab
            window.open(url, '_blank');
        }

        function showLoading(msg) {
            document.getElementById('loading').textContent = msg;
            document.getElementById('loading').style.display = 'block';
        }

        function showError(msg) {
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
        }

        function showSuccess(msg) {
            document.getElementById('success').textContent = msg;
            document.getElementById('success').style.display = 'block';
        }

        function hideAll() {
            ['loading','error','success'].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
        }

        // Auto features
        document.getElementById('url').addEventListener('paste', () => {
            setTimeout(getVideo, 300);
        });
        
        document.getElementById('url').addEventListener('keypress', e => {
            if (e.key === 'Enter') getVideo();
        });

        // iPhone fixes
        document.addEventListener('touchstart', function(){}, true);
    </script>
</body>
</html>
