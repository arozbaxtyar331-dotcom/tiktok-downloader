<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader - No Watermark</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .logo {
            font-size: 2.8em;
            background: linear-gradient(45deg, #ff0050, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .subtitle {
            color: #555;
            margin-bottom: 30px;
            font-size: 1.2em;
        }

        input[type="url"] {
            width: 100%;
            padding: 20px 25px;
            border: 3px solid #e0e0e0;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            background: white;
            font-family: inherit;
        }

        input[type="url"]:focus {
            border-color: #ff0050;
            box-shadow: 0 0 0 4px rgba(255,0,80,0.1);
        }

        .download-btn {
            background: linear-gradient(45deg, #ff0050, #ff6b9d);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .download-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255,0,80,0.4);
        }

        .download-btn:active {
            transform: translateY(-1px);
        }

        .download-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 15px;
            font-weight: 600;
            display: none;
        }

        .loading {
            background: #e3f2fd;
            color: #1976d2;
            display: none;
        }

        .spinner {
            border: 3px solid #e3f2fd;
            border-top: 3px solid #ff0050;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
            display: block;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            border-left: 5px solid #f44336;
        }

        .success {
            background: #e8f5e8;
            color: #2e7d32;
            border-left: 5px solid #4caf50;
        }

        .download-grid {
            display: none;
            margin-top: 30px;
            gap: 15px;
        }

        .download-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: left;
            transition: all 0.3s ease;
        }

        .download-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .download-btn-small {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            margin-top: 10px;
        }

        .download-btn-small:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(78,205,196,0.4);
        }

        .download-btn-small.audio {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
        }

        .video-preview {
            margin: 20px 0;
            display: none;
        }

        .video-preview video {
            width: 100%;
            max-height: 250px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            .logo { font-size: 2.2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📱 TikTok Downloader</div>
        <div class="subtitle">Download HD videos without watermark</div>
        
        <input type="url" id="videoUrl" placeholder="Paste TikTok link here..." />
        <button class="download-btn" onclick="startDownload()">🚀 Get Video</button>
        
        <div class="status loading" id="loading">
            <div class="spinner"></div>
            Processing your video...
        </div>
        
        <div class="status error" id="error"></div>
        <div class="status success" id="success"></div>
        
        <div class="video-preview" id="preview"></div>
        
        <div class="download-grid" id="downloads">
            <div class="download-card">
                <h3>📹 HD Video (No Watermark)</h3>
                <p>High quality MP4 download</p>
                <a href="#" class="download-btn-small" id="videoBtn" onclick="forceDownload('video')">Download Video</a>
            </div>
            <div class="download-card">
                <h3>🔊 Audio Only</h3>
                <p>Extract audio as MP3</p>
                <a href="#" class="download-btn-small audio" id="audioBtn" onclick="forceDownload('audio')">Download Audio</a>
            </div>
        </div>
    </div>

    <script>
        let currentVideoUrl = '';
        let currentAudioUrl = '';

        async function startDownload() {
            const input = document.getElementById('videoUrl');
            const url = input.value.trim();
            
            if (!url) {
                showStatus('error', 'Please paste a TikTok URL first!');
                return;
            }
            
            // Reset UI
            hideAllStatus();
            document.getElementById('downloads').style.display = 'none';
            document.getElementById('preview').style.display = 'none';
            
            // Show loading
            showStatus('loading', '🔍 Fetching video...');
            document.querySelector('.download-btn').disabled = true;
            
            try {
                const data = await fetchVideo(url);
                currentVideoUrl = data.video;
                currentAudioUrl = data.audio || data.music;
                
                // Update buttons
                document.getElementById('videoBtn').dataset.url = currentVideoUrl;
                document.getElementById('audioBtn').dataset.url = currentAudioUrl;
                
                // Show preview
                showPreview(currentVideoUrl);
                
                // Show downloads
                document.getElementById('downloads').style.display = 'grid';
                showStatus('success', '✅ Ready! Tap download buttons below 👇');
                
            } catch (error) {
                console.error(error);
                showStatus('error', '❌ Video not found. Try another public TikTok video.');
            } finally {
                document.querySelector('.download-btn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        async function fetchVideo(url) {
            // Primary working API
            const response = await fetch('https://www.tikwm.com/api/?url=' + encodeURIComponent(url) + '&hd=1');
            const data = await response.json();
            
            if (data.code === 0) {
                return {
                    video: data.data.play,
                    audio: data.data.music
                };
            }
            
            // Backup API
            const backup = await fetch('https://api22-normal-c-useast1a.tiktokv.com/aweme/v1/aweme/detail/?aweme_id=' + extractId(url));
            const backupData = await backup.json();
            
            return {
                video: backupData.aweme_detail.video.play_addr.url_list[0],
                audio: backupData.aweme_detail.music.play_url.url_list[0]
            };
        }

        function extractId(url) {
            const match = url.match(/video\/(\d+)/);
            return match ? match[1] : '';
        }

        function showPreview(url) {
            const preview = document.getElementById('preview');
            preview.innerHTML = `<video src="${url}" controls autoplay muted loop style="width:100%;max-height:250px;border-radius:20px;"></video>`;
            preview.style.display = 'block';
        }

        function forceDownload(type) {
            const url = type === 'video' ? currentVideoUrl : currentAudioUrl;
            if (!url) return;
            
            // Multiple download methods for iPhone compatibility
            downloadDirect(url);
            openInNewTab(url);
            copyToClipboard(url);
        }

        function downloadDirect(url) {
            const link = document.createElement('a');
            link.href = url;
            link.download = `tiktok_${Date.now()}.mp4`;
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function openInNewTab(url) {
            window.open(url, '_blank');
        }

        function copyToClipboard(url) {
            navigator.clipboard.writeText(url).catch(() => {});
        }

        function showStatus(type, message) {
            hideAllStatus();
            const el = document.getElementById(type);
            el.textContent = message;
            el.style.display = 'block';
        }

        function hideAllStatus() {
            ['loading', 'error', 'success'].forEach(type => {
                document.getElementById(type).style.display = 'none';
            });
        }

        // Event listeners
        document.getElementById('videoUrl').addEventListener('keypress', e => {
            if (e.key === 'Enter') startDownload();
        });

        document.getElementById('videoUrl').addEventListener('paste', () => {
            setTimeout(startDownload, 500);
        });

        // iPhone Safari fix - prevent zoom
        document.addEventListener('gesturestart', function (e) {
            e.preventDefault();
        });

        document.addEventListener('touchmove', function (e) {
            if (e.scale !== 1) { e.preventDefault(); }
        }, { passive: false });
    </script>
</body>
</html>
